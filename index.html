<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Board of Eventuallaty</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #fff; --accent: #3b82f6; --lyla: #a855f7; --jacob: #10b981; --dad: #f59e0b; --mum: #ef4444; --blocked: #dc2626; --gold: #fbbf24;}
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 80px; }
        h1 { text-align: center; color: var(--accent); font-size: 22px; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #888; font-size: 12px; margin-top: 0; margin-bottom: 15px;}
        
        .timers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .kid-card { background: var(--card); padding: 10px; border-radius: 8px; text-align: center; border-top: 4px solid; position: relative;}
        .kid-card.lyla { border-color: var(--lyla); } .kid-card.jacob { border-color: var(--jacob); }
        .bank-balance { position: absolute; top: 10px; right: 10px; color: var(--gold); font-weight: bold; font-size: 14px;}
        .timer-btn { width: 100%; padding: 8px; margin: 4px 0; border: none; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; }
        .timer-btn.hw { background: #333; } .timer-btn.out { background: #333; }
        .timer-btn.active { background: #eab308; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .add-task { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 15px; background: var(--card); padding: 10px; border-radius: 8px;}
        .add-task input, .add-task select { padding: 10px; background: #111; border: 1px solid #333; color: white; border-radius: 6px; }
        .add-task button { padding: 10px; background: var(--accent); color: white; border: none; border-radius: 6px; font-weight: bold; flex-grow: 1;}

        .board { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; scroll-snap-type: x mandatory;}
        .column { flex: 0 0 85%; background: #1a1a1a; border-radius: 8px; padding: 10px; scroll-snap-align: start; border: 1px solid #333;}
        .col-header { font-weight: bold; text-transform: uppercase; font-size: 14px; margin-bottom: 10px; color: #aaa; text-align: center;}
        
        .task { background: var(--card); padding: 12px; border-radius: 6px; margin-bottom: 8px; border-left: 4px solid #555; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .task[data-owner="Lyla"] { border-color: var(--lyla); } .task[data-owner="Jacob"] { border-color: var(--jacob); }
        .task[data-owner="Dad"] { border-color: var(--dad); } .task[data-owner="Mum"] { border-color: var(--mum); }
        .task.is-blocked { border-color: var(--blocked); background: #3f1515; }
        
        .admin-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .admin-btn { padding: 12px; background: #333; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;}
        #close-week-btn { background: var(--gold); color: #000; grid-column: span 2;}

        /* MODALS */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--card); width: 100%; max-width: 400px; border-radius: 12px; padding: 20px; border: 1px solid #444; max-height: 80vh; overflow-y: auto;}
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px;}
        .close-btn { background: none; border: none; color: #888; font-size: 24px; cursor: pointer;}
        
        /* Task Control Modal */
        .modal-notes { width: 100%; height: 80px; background: #111; color: white; border: 1px solid #333; border-radius: 6px; padding: 10px; margin-bottom: 15px;}
        .modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px;}
        .action-btn { padding: 12px; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer;}
        
        /* Archive List */
        .archive-item { border-bottom: 1px solid #333; padding: 10px 0; font-size: 12px;}
    </style>
</head>
<body>

    <h1>BOARD OF EVENTUALLATY</h1>
    <p class="subtitle">Live Family Roster</p>

    <div class="timers-grid">
        <div class="kid-card lyla">
            <div class="bank-balance" id="lyla-bank">$0.00</div>
            <h3 style="margin-top:5px; margin-bottom:5px;">Lyla</h3>
            <button id="btn-lyla-hw" class="timer-btn hw" onclick="toggleTimer('lyla', 'hw')">▶ HW: <span id="lyla-hw-val">0</span>m</button>
            <button id="btn-lyla-out" class="timer-btn out" onclick="toggleTimer('lyla', 'out')">▶ Dogs/Out: <span id="lyla-out-val">0</span>m</button>
        </div>
        <div class="kid-card jacob">
            <div class="bank-balance" id="jacob-bank">$0.00</div>
            <h3 style="margin-top:5px; margin-bottom:5px;">Jacob</h3>
            <button id="btn-jacob-hw" class="timer-btn hw" onclick="toggleTimer('jacob', 'hw')">▶ HW: <span id="jacob-hw-val">0</span>m</button>
            <button id="btn-jacob-out" class="timer-btn out" onclick="toggleTimer('jacob', 'out')">▶ Garry/Out: <span id="jacob-out-val">0</span>m</button>
        </div>
    </div>

    <div class="add-task">
        <input type="text" id="new-task-name" placeholder="New Chore..." style="flex-grow: 1; min-width: 150px;">
        <select id="new-task-owner" style="width: 80px;">
            <option value="Any">Any</option><option value="Lyla">Lyla</option><option value="Jacob">Jacob</option><option value="Mum">Mum</option><option value="Dad">Dad</option>
        </select>
        <input type="number" id="new-task-value" placeholder="$ Val" style="width: 70px;" min="0" step="0.5">
        <button onclick="addTask()">ADD</button>
    </div>

    <div class="board">
        <div class="column" id="col-todo"><div class="col-header">📌 To Do</div><div class="task-list" id="list-todo"></div></div>
        <div class="column" id="col-progress"><div class="col-header">⏳ In Progress</div><div class="task-list" id="list-progress"></div></div>
        <div class="column" id="col-done"><div class="col-header">✅ Done</div><div class="task-list" id="list-done"></div></div>
    </div>

    <div class="admin-controls">
        <button class="admin-btn" onclick="openArchive()">🗓️ View Archive</button>
        <button class="admin-btn" onclick="manualAddFunds()">💰 Adjust Bank</button>
        <button id="close-week-btn" class="admin-btn" onclick="closeWeek()">🏁 CLOSE WEEK & PAY</button>
    </div>

    <div id="task-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <div>
                    <h2 id="modal-task-name" style="margin:0; color:var(--accent);">Task Name</h2>
                    <small id="modal-task-owner" style="color:#888;">Owner</small> <span id="modal-task-val" style="color:var(--gold); font-weight:bold; margin-left:10px;"></span>
                </div>
                <button class="close-btn" onclick="closeModal('task-modal')">×</button>
            </div>
            <textarea id="modal-notes" class="modal-notes" placeholder="Notes or reason blocked..."></textarea>
            <div class="modal-actions">
                <button class="action-btn" style="background:#4b5563;" onclick="moveTaskFromModal('back')">← Move Back</button>
                <button class="action-btn" style="background:var(--accent);" onclick="moveTaskFromModal('forward')">Move Forward →</button>
                <button class="action-btn" style="background:var(--blocked); grid-column:span 2;" id="modal-block-btn" onclick="toggleBlockTask()">🛑 Mark as Blocked</button>
            </div>
        </div>
    </div>

    <div id="archive-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 style="margin:0;">Archived History</h2>
                <button class="close-btn" onclick="closeModal('archive-modal')">×</button>
            </div>
            <div id="archive-list">Loading...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove, update, get } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDIZPvA5GUPfmyVrQYFN61wFsyHhtGZyyI",
            authDomain: "liveroster-f26ea.firebaseapp.com",
            projectId: "liveroster-f26ea",
            storageBucket: "liveroster-f26ea.firebasestorage.app",
            messagingSenderId: "428546877467",
            appId: "1:428546877467:web:ce988fa4b7627de0a1f0be"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const PARENT_PIN = "1234"; // <--- CHANGE THIS IF THE KIDS FIGURE IT OUT

        function verifyParent() {
            const pin = prompt("Enter Parent PIN to proceed:");
            return pin === PARENT_PIN;
        }

        // --- GLOBAL VARIABLES ---
        let currentTasksData = {}; 
        let activeTaskId = null;
        let ledgerData = { lyla: 0, jacob: 0 };

        // --- SYNC LEDGER (BANK) ---
        onValue(ref(db, 'ledger'), (snapshot) => {
            const data = snapshot.val() || { lyla: 0, jacob: 0 };
            ledgerData = data;
            document.getElementById('lyla-bank').innerText = `$${(data.lyla || 0).toFixed(2)}`;
            document.getElementById('jacob-bank').innerText = `$${(data.jacob || 0).toFixed(2)}`;
        });

        // --- SYNC TASKS ---
        onValue(ref(db, 'tasks'), (snapshot) => {
            document.getElementById('list-todo').innerHTML = '';
            document.getElementById('list-progress').innerHTML = '';
            document.getElementById('list-done').innerHTML = '';
            
            currentTasksData = snapshot.val() || {};
            
            for (let id in currentTasksData) {
                const task = currentTasksData[id];
                const el = document.createElement('div');
                el.className = `task ${task.blocked ? 'is-blocked' : ''}`;
                el.setAttribute('data-owner', task.owner);
                el.onclick = () => window.openTaskModal(id);
                
                let icon = task.blocked ? '🛑' : '▶';
                if(task.status === 'done') icon = '✅';

                let valIndicator = task.value > 0 ? `<span style="color:var(--gold); font-weight:bold; margin-left:5px;">$${task.value}</span>` : '';

                if(task.status === 'done') {
                    el.innerHTML = `<span><strike>${task.name}</strike> <br><small style="color:#888">${task.owner}</small>${valIndicator}</span> <span>${icon}</span>`;
                } else {
                    el.innerHTML = `<span><strong>${task.name}</strong> <br><small style="color:#888">${task.owner}</small>${valIndicator}</span> <span>${icon}</span>`;
                }
                
                if(task.status === 'todo') document.getElementById('list-todo').appendChild(el);
                if(task.status === 'progress') document.getElementById('list-progress').appendChild(el);
                if(task.status === 'done') document.getElementById('list-done').appendChild(el);
            }
        });

        // --- ADD TASK ---
        window.addTask = function() {
            const name = document.getElementById('new-task-name').value.trim();
            const owner = document.getElementById('new-task-owner').value;
            const value = parseFloat(document.getElementById('new-task-value').value) || 0;
            
            if(!name) return;
            push(ref(db, 'tasks'), { name: name, owner: owner, value: value, status: 'todo', blocked: false, notes: '' });
            
            document.getElementById('new-task-name').value = '';
            document.getElementById('new-task-value').value = '';
        };

        // --- TASK MODAL LOGIC ---
        window.openTaskModal = function(id) {
            activeTaskId = id;
            const task = currentTasksData[id];
            
            document.getElementById('modal-task-name').innerText = task.name;
            document.getElementById('modal-task-owner').innerText = task.owner;
            document.getElementById('modal-task-val').innerText = task.value > 0 ? `$${task.value}` : '';
            document.getElementById('modal-notes').value = task.notes || '';
            
            const blockBtn = document.getElementById('modal-block-btn');
            if(task.blocked) {
                blockBtn.innerText = "✅ Unblock Task"; blockBtn.style.background = "#10b981";
            } else {
                blockBtn.innerText = "🛑 Mark as Blocked"; blockBtn.style.background = "var(--blocked)";
            }
            document.getElementById('task-modal').style.display = 'flex';
        };

        window.closeModal = function(modalId) {
            if(modalId === 'task-modal' && activeTaskId) {
                const newNotes = document.getElementById('modal-notes').value;
                if(newNotes !== currentTasksData[activeTaskId].notes) {
                    update(ref(db, 'tasks/' + activeTaskId), { notes: newNotes });
                }
                activeTaskId = null;
            }
            document.getElementById(modalId).style.display = 'none';
        };

        window.moveTaskFromModal = function(direction) {
            if(!activeTaskId) return;
            const currentStatus = currentTasksData[activeTaskId].status;
            let nextStatus = currentStatus;

            if(direction === 'forward') {
                if(currentStatus === 'todo') nextStatus = 'progress';
                else if(currentStatus === 'progress') nextStatus = 'done';
            } else if (direction === 'back') {
                if(currentStatus === 'done') nextStatus = 'progress';
                else if(currentStatus === 'progress') nextStatus = 'todo';
            }

            update(ref(db, 'tasks/' + activeTaskId), { status: nextStatus, blocked: false });
            closeModal('task-modal');
        };

        window.toggleBlockTask = function() {
            if(!activeTaskId) return;
            update(ref(db, 'tasks/' + activeTaskId), { blocked: !currentTasksData[activeTaskId].blocked });
            closeModal('task-modal');
        };

        // --- TIMERS ---
        let timersData = { lyla: { hw: 0, out: 0 }, jacob: { hw: 0, out: 0 } };
        let activeTimer = null; let activeInterval = null;

        onValue(ref(db, 'timers'), (snapshot) => {
            const data = snapshot.val();
            if(data) {
                timersData = data;
                document.getElementById('lyla-hw-val').innerText = data.lyla?.hw || 0; document.getElementById('lyla-out-val').innerText = data.lyla?.out || 0;
                document.getElementById('jacob-hw-val').innerText = data.jacob?.hw || 0; document.getElementById('jacob-out-val').innerText = data.jacob?.out || 0;
            }
        });

        window.toggleTimer = function(kid, type) {
            const btnId = `btn-${kid}-${type}`; const btn = document.getElementById(btnId);
            if(activeTimer === btnId) {
                clearInterval(activeInterval); btn.classList.remove('active'); btn.innerHTML = btn.innerHTML.replace('⏹ Stop', '▶'); activeTimer = null; return;
            }
            if(activeTimer) { alert("Stop current timer first!"); return; }

            activeTimer = btnId; btn.classList.add('active'); btn.innerHTML = btn.innerHTML.replace('▶', '⏹ Stop');
            activeInterval = setInterval(() => {
                let currentMins = timersData[kid]?.[type] || 0;
                update(ref(db, `timers/${kid}`), { [type]: currentMins + 1 });
            }, 60000); 
        };

        // --- PARENT / ADMIN CONTROLS ---
        window.manualAddFunds = function() {
            if(!verifyParent()) { alert("Incorrect PIN"); return; }
            let kid = prompt("Who to adjust? (Type 'Lyla' or 'Jacob')").toLowerCase();
            if(kid !== 'lyla' && kid !== 'jacob') return;
            
            let amount = parseFloat(prompt(`Enter amount to ADD to ${kid}'s bank (use negative to subtract):`, "15.00"));
            if(isNaN(amount)) return;

            let newBalance = (ledgerData[kid] || 0) + amount;
            update(ref(db, 'ledger'), { [kid]: newBalance });
            alert(`Updated! ${kid} now has $${newBalance.toFixed(2)}`);
        };

        window.closeWeek = function() {
            if(!verifyParent()) { alert("Incorrect PIN"); return; }
            if(!confirm("Are you sure? This will sum up Done tasks, add money to the Bank, and archive completed tasks.")) return;

            let earnedLyla = 0; let earnedJacob = 0;
            let archiveData = {};
            const dateStr = new Date().toLocaleDateString().replace(/\//g, '-');

            // 1. Process Done Tasks
            for (let id in currentTasksData) {
                let t = currentTasksData[id];
                if(t.status === 'done') {
                    // Tally money
                    if(t.owner === 'Lyla' && t.value) earnedLyla += t.value;
                    if(t.owner === 'Jacob' && t.value) earnedJacob += t.value;
                    
                    // Add to archive payload
                    archiveData[id] = { ...t, archivedOn: dateStr };
                    
                    // Remove from active board
                    remove(ref(db, 'tasks/' + id));
                }
            }

            // 2. Add Base Pay Prompt
            if(confirm("Add $15 Base Pay to Lyla? (All core chores done?)")) earnedLyla += 15;
            if(confirm("Add $15 Base Pay to Jacob? (All core chores done?)")) earnedJacob += 15;

            // 3. Update Firebase
            if(Object.keys(archiveData).length > 0) {
                update(ref(db, `archive/${dateStr}`), archiveData);
            }
            
            update(ref(db, 'ledger'), { 
                lyla: (ledgerData.lyla || 0) + earnedLyla, 
                jacob: (ledgerData.jacob || 0) + earnedJacob 
            });

            // 4. Reset Timers
            update(ref(db, 'timers'), { lyla: { hw: 0, out: 0 }, jacob: { hw: 0, out: 0 } });

            alert(`Week Closed!\nLyla Earned: $${earnedLyla}\nJacob Earned: $${earnedJacob}\nUncompleted tasks rolled over.`);
        };

        window.openArchive = function() {
            document.getElementById('archive-modal').style.display = 'flex';
            const list = document.getElementById('archive-list');
            list.innerHTML = "Loading...";

            get(ref(db, 'archive')).then((snapshot) => {
                const data = snapshot.val();
                if(!data) { list.innerHTML = "No archived tasks yet."; return; }
                
                list.innerHTML = '';
                // data is grouped by date string
                for(let date in data) {
                    list.innerHTML += `<h3 style="color:var(--accent); border-bottom:1px solid #333; margin-top:15px;">Week of ${date}</h3>`;
                    let tasks = data[date];
                    for(let id in tasks) {
                        let t = tasks[id];
                        list.innerHTML += `
                            <div
